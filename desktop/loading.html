<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>Smart Scribe</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #1B2220;
      color: #E2EAE5;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei UI", sans-serif;
      user-select: none;
    }
    body {
      display: grid;
      place-items: center;
    }
    .shell {
      width: min(560px, calc(100vw - 64px));
      padding: 34px 36px 32px;
      border: 1px solid rgba(226, 234, 229, 0.10);
      border-radius: 18px;
      background: rgba(20, 27, 25, 0.72);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(226, 234, 229, 0.10);
      font-size: 22px;
      color: #E2EAE5;
    }
    .brand-title {
      font-size: 24px;
      font-weight: 760;
      letter-spacing: -0.02em;
    }
    .eyebrow {
      margin-bottom: 8px;
      color: rgba(226, 234, 229, 0.48);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }
    .detail {
      min-height: 22px;
      margin-top: 10px;
      color: rgba(226, 234, 229, 0.62);
      font-size: 13px;
      line-height: 1.65;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spinner {
      width: 38px;
      height: 38px;
      margin: 28px auto 0;
      border-radius: 999px;
      border: 3px solid rgba(226, 234, 229, 0.12);
      border-top-color: #E2EAE5;
      animation: spin 0.85s linear infinite;
    }
    .progress-wrap {
      display: none;
      margin-top: 28px;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: rgba(226, 234, 229, 0.54);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(226, 234, 229, 0.10);
    }
    .bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #CFE0D6, #91B8A7);
      transition: width 280ms ease;
    }
    .hint {
      margin-top: 18px;
      color: rgba(226, 234, 229, 0.38);
      font-size: 12px;
      line-height: 1.6;
    }
    body.installing .spinner { display: none; }
    body.installing .progress-wrap { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="shell">
    <section class="brand">
      <div class="mark">✦</div>
      <div class="brand-title">Smart Scribe</div>
    </section>
    <div class="eyebrow" id="mode">启动中</div>
    <h1 id="title">正在启动服务</h1>
    <div class="detail" id="detail">正在准备本地工作台，请稍等</div>
    <div class="spinner" aria-hidden="true"></div>
    <section class="progress-wrap" aria-label="安装进度">
      <div class="progress-meta">
        <span id="step">准备安装</span>
        <span id="percent">0%</span>
      </div>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="hint">首次启动会安装 Python、Node、ffmpeg、前后端依赖等环境。后续启动只会显示普通加载。</div>
    </section>
  </main>
  <script>
    const modeEl = document.getElementById("mode");
    const titleEl = document.getElementById("title");
    const detailEl = document.getElementById("detail");
    const stepEl = document.getElementById("step");
    const percentEl = document.getElementById("percent");
    const barEl = document.getElementById("bar");

    function setStatus(status) {
      if (!status) return;
      const installing = status.mode === "install";
      document.body.classList.toggle("installing", installing);
      modeEl.textContent = installing ? "首次安装" : "启动中";
      if (status.title) {
        titleEl.textContent = status.title;
        stepEl.textContent = status.title;
      }
      if (status.detail) detailEl.textContent = status.detail;
      if (typeof status.progress === "number") {
        const value = Math.max(0, Math.min(100, Math.round(status.progress)));
        percentEl.textContent = value + "%";
        barEl.style.width = value + "%";
      }
    }

    window.smartScribe?.onStartupStatus?.(setStatus);
    window.smartScribe?.getStartupStatus?.().then(setStatus).catch(() => {});
  </script>
</body>
</html>
